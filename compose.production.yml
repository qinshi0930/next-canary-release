# 生产环境 — Nginx 网关 + stable 应用
# 应用变量通过 env_file 整体传入，compose 变量替换仍需 --env-file
services:
  nginx:
    image: nginx:alpine
    container_name: canary-nginx
    restart: unless-stopped
    ports:
      - "6080:6080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - canary-network

  stable-app:
    image: xingye-site:stable
    container_name: canary-stable-app
    restart: unless-stopped
    env_file: .env.production
    environment:
      HOSTNAME: "0.0.0.0"
    networks:
      - canary-network

networks:
  canary-network:
    external: true